<style>
  button{
    height: 40px;
    width: 104px;
    border-radius: 4px;
    cursor: pointer;
  }
  .subscribe-button{
    background-color: rgb(228, 37, 37);
    color: white;
    border: none;
  }
  .join-button{
    background-color: transparent;
    border-color: rgb(2, 137, 190);
    color: rgb(0, 183, 255);
    border-style: solid;
    border-width: 1px;
  }
  .share-button{
    background-color: rgb(0, 174, 255);

    color: white;
    border-radius: 40px;
    font-size: 16px;
    font-weight: bold;
  }
  .large-text{
    font-weight: bold;
    font-size: 32px;
    color: black;
  }
  .prize{
    color: green;
    font-weight: bold;
    font-size: 24px;
  }
  .add-to-cart-button{
    border-style: none;
    background-color: rgb(255, 211, 67);
    border-radius: 20px;
    margin: 4px;
  }
  .add-to-cart-button:hover{
    opacity: 0.8;
  }
  .add-to-cart-button:active{
    opacity: 0.5;
  }
  .buy-now-button{
    border-style: none;
    background-color: orange;
    border-radius: 20px;
    margin: 4px;
  }
  .buy-now-button:hover{
