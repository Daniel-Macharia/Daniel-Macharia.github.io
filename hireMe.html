<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daniel Macharia|Hire Me</title>
    <link rel="stylesheet" type="text/css" href="hireMeStyle.css"/>
    <script src="hireMeFuntionality.js"></script>
</head>
<body>
    <div id="container">
        <form>
            <div class="input-prompt">
                <label class="input-label">Name:</label>
                <input id="sender-name" autofocus class="input-field" type="text" placeholder="your name"/>
            </div>
            <div class="input-prompt">
                <label class="input-label">Contact Info:</label>
                <input id="sender-contact" autofocus class="input-field" type="text" placeholder="your contact"/>
            </div>
            <div class="input-prompt">
                <label class="input-label">Job Title:</label>
                <input id="job-title" autofocus class="input-field" type="text" placeholder="Job title"/>
            </div>
            <div class="input-prompt">
                <label class="input-label">Job Description:</label>
                <input id="job-desc" autofocus class="input-field" type="text" placeholder="Job description"/>
            </div>
    
            <div id="submit-btn">
                <input id="submit" type="submit" value="Send"/>
            </div>
        </form>
    </div>
</body>
</html>
